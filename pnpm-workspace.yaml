packages:
  - 'apps/*'
  - 'packages/*'
  - 'packages/config/*'

# Scripts post-install autorises (necessaires au fonctionnement) :
#   - @prisma/client + @prisma/engines : telechargement binaires Prisma
#   - prisma : meme raison (CLI)
#   - argon2 : compilation native node-gyp (hash mots de passe)
#   - esbuild : binaire natif (utilise par tsx/next)
#   - sharp : binaire natif (optimisation images Next.js)
#   - unrs-resolver : binaire natif (utilise par turbo)
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  argon2: true
  esbuild: true
  prisma: true
  sharp: true
  unrs-resolver: true
