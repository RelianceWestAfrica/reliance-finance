name: Deploy to Hostinger VPS

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Tests + Lint + Typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  build:
    name: Build & Push image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            node_auth_token=${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          envs: GITHUB_SHA
          script: |
            set -euo pipefail
            cd /opt/reliance-finance
            IMAGE_SHA="sha-${GITHUB_SHA::7}"
            echo "IMAGE_TAG=${IMAGE_SHA}" > .env.runtime
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker compose --env-file .env.production --env-file .env.runtime -f docker-compose.prod.yml pull web
            # --force-recreate garantit que le conteneur web est bien remplacé
            # même quand compose ne détecte pas de changement de config.
            docker compose --env-file .env.production --env-file .env.runtime -f docker-compose.prod.yml up -d --no-deps --force-recreate web

            # Vérifie que le conteneur tourne bien sur l'image attendue.
            RUNNING_IMG=$(docker inspect --format '{{.Config.Image}}' reliance-web 2>/dev/null || echo "")
            echo "running image: ${RUNNING_IMG}"
            case "${RUNNING_IMG}" in
              *"${IMAGE_SHA}"*) echo "image tag matches ${IMAGE_SHA}";;
              *) echo "FATAL: container is not on ${IMAGE_SHA} (got ${RUNNING_IMG})"; exit 1;;
            esac

            ok=0
            for i in $(seq 1 12); do
              if curl -fsS https://finances.rwa-core.com/api/health | grep -q '"status":"ok"'; then ok=1; echo "HEALTH OK"; break; fi
              echo "waiting for app..."; sleep 3
            done
            [ "$ok" = "1" ]
            docker image prune -f
        env:
          GITHUB_SHA: ${{ github.sha }}
